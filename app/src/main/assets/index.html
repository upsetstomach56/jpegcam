<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>filmOS Dashboard</title>
    <style>
        :root { --bg-dark: #0a0a0a; --bg-panel: #1a1a1a; --accent: #ff5000; --text-main: #ffffff; --text-muted: #888888; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-dark); color: var(--text-main); -webkit-user-select: none; }
        header { background-color: var(--bg-panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        .sys-info { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .toolbar { position: sticky; top: 0; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); padding: 10px 20px; z-index: 100; border-bottom: 1px solid #222; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; background: #111; padding: 4px; border-radius: 8px; }
        .btn { background: none; border: none; color: #666; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn.active { background: var(--accent); color: white; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { background: #222; color: #444; }
        .secondary-btn { background: #222; border: 1px solid #333; color: #888; margin-right: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--bg-panel); border-radius: 10px; overflow: hidden; position: relative; border: 2px solid transparent; transition: 0.2s; cursor: pointer; }
        .card.selected { border-color: var(--accent); background: #25120a; }
        .card img { width: 100%; height: 140px; object-fit: cover; background: #000; }
        .card-info { padding: 10px; font-size: 11px; display: flex; justify-content: space-between; color: #888; }
        .checkbox-hitbox { position: absolute; top: 0; left: 0; width: 60px; height: 60px; z-index: 10; }
        .sel-indicator { position: absolute; top: 10px; left: 10px; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-radius: 4px; background: rgba(0,0,0,0.5); }
        .card.selected .sel-indicator { background: var(--accent); border-color: var(--accent); }
        .card.selected .sel-indicator::after { content: '✓'; color: white; font-size: 12px; position: absolute; left: 4px; top: 0px; font-weight: bold; }
        
        .load-more-container { grid-column: 1 / -1; text-align: center; padding: 20px 0; }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 65vh; border-radius: 2px; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: default; }
        .lb-meta { margin-top: 20px; text-align: center; max-width: 90%; pointer-events: none; }
        .exif-tag { color: var(--accent); font-family: monospace; font-size: 13px; font-weight: bold; text-transform: uppercase; background: rgba(255,80,0,0.1); padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(255,80,0,0.2); }
        .lb-tools { margin-top: 25px; display: flex; gap: 15px; cursor: default; }

        /* LUT Manager Modal */
        #lut-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-panel); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap: 15px;">
            <h3 style="margin:0; letter-spacing:1px; font-weight:900;">filmOS DASHBOARD</h3>
            <button class="action-btn secondary-btn" style="padding: 6px 12px; font-size:10px; margin:0;" onclick="showLutManager()">MANAGE LUTS</button>
        </div>
        <div class="sys-info" id="sys-info">SYNCING HARDWARE...</div>
    </header>

    <div class="toolbar">
        <div class="row">
            <div class="btn-group" id="mode-toggle">
                <button class="btn active" id="btn-DCIM" onclick="setMode('DCIM')">ORIGINALS</button>
                <button class="btn" id="btn-GRADED" onclick="setMode('GRADED')" style="display:none">RECIPES</button>
            </div>
            <div class="btn-group">
                <button class="btn active" id="f-all" onclick="setFilter('all')">ALL TIME</button>
                <button class="btn" id="f-today" onclick="setFilter('today')">TODAY</button>
            </div>
        </div>
        <div class="row">
            <span id="sel-count" style="font-size:12px; color:var(--text-muted)">0 ITEMS SELECTED</span>
            <div>
                <button class="action-btn secondary-btn" id="unsel-btn" style="display:none" onclick="unselectAll()">UNSELECT ALL</button>
                <button class="action-btn" id="dl-btn" disabled onclick="downloadSelected()">DOWNLOAD SELECTED</button>
            </div>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
        <div class="lb-meta" id="lb-meta"></div>
        <div class="lb-tools" onclick="event.stopPropagation()">
            <button class="action-btn" style="background:#222; border:1px solid #444;" onclick="rotatePreview()">ROTATE 90°</button>
            <button class="action-btn" onclick="downloadCurrent()">SAVE TO DEVICE</button>
        </div>
    </div>

    <div id="lut-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--accent); letter-spacing: 1px;">INSTALL RECIPE</h3>
            <p style="font-size:13px; color:#aaa; margin-bottom: 25px;">Upload a .cube file directly to your camera's internal SD card.</p>
            
            <input type="file" id="lut-file" accept=".cube,.cub" style="display:none" onchange="handleLutSelect(event)">
            <button class="action-btn" style="width:100%; margin-bottom:15px; padding: 12px;" onclick="document.getElementById('lut-file').click()">SELECT .CUBE FILE</button>
            
            <div id="lut-upload-status" style="font-size:12px; font-weight:bold; margin-bottom:15px; color:#fff; height: 15px;"></div>
            
            <button class="action-btn secondary-btn" style="width:100%; margin:0; padding: 12px;" onclick="closeLutManager()">CLOSE & RESTART APP</button>
        </div>
    </div>

    <script>
        let currentFiles = [];
        let selected = new Set();
        let mode = 'DCIM';
        let filter = 'all';
        let rotation = 0;
        let viewName = "";
        let abortController = null;
        let currentPage = 1;
        const PAGE_SIZE = 24;

        async function init() {
            const res = await fetch('/api/system');
            const sys = await res.json();
            document.getElementById('sys-info').innerText = `${sys.storage_gb}GB FREE`;
            if(sys.has_graded) document.getElementById('btn-GRADED').style.display = 'block';
            loadFiles();
        }

        async function loadFiles() {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            document.getElementById('gallery').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:#444; font-weight:bold;">INITIALIZING SD INTERFACE...</div>';
            try {
                const res = await fetch(`/api/files?folder=${mode}`, { signal: abortController.signal });
                const data = await res.json();
                currentFiles = data.files;
                selected.clear();
                render(true);
            } catch (err) { if(err.name !== 'AbortError') console.error(err); }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-DCIM').classList.toggle('active', m === 'DCIM');
            document.getElementById('btn-GRADED').classList.toggle('active', m === 'GRADED');
            loadFiles();
        }

        function setFilter(f) {
            filter = f;
            document.getElementById('f-all').classList.toggle('active', f === 'all');
            document.getElementById('f-today').classList.toggle('active', f === 'today');
            render(true);
        }

        function render(resetPage = false) {
            if (resetPage) currentPage = 1;
            
            const container = document.getElementById('gallery');
            if (resetPage) container.innerHTML = '';
            else {
                const oldBtn = document.getElementById('load-more-btn');
                if (oldBtn) oldBtn.remove();
            }
            
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const filtered = currentFiles.filter(f => filter === 'all' || f.date >= startOfToday);
            
            const startIndex = (currentPage - 1) * PAGE_SIZE;
            const paginated = filtered.slice(startIndex, currentPage * PAGE_SIZE);

            paginated.forEach(f => {
                const card = document.createElement('div');
                card.className = `card ${selected.has(f.name) ? 'selected' : ''}`;
                card.onclick = () => toggleSel(f.name);
                card.innerHTML = `
                    <div class="checkbox-hitbox" onclick="event.stopPropagation(); toggleSel('${f.name}')"></div>
                    <div class="sel-indicator"></div>
                    <img src="/thumb/?folder=${mode}&name=${f.name}" onclick="event.stopPropagation(); openLightbox('${f.name}')">
                    <div class="card-info"><span>${f.name}</span><span>${(f.size/1024/1024).toFixed(1)}MB</span></div>
                `;
                container.appendChild(card);
            });
            
            if (filtered.length > currentPage * PAGE_SIZE) {
                const loadMoreDiv = document.createElement('div');
                loadMoreDiv.id = 'load-more-btn';
                loadMoreDiv.className = 'load-more-container';
                loadMoreDiv.innerHTML = `<button class="action-btn secondary-btn" onclick="loadMore()">LOAD MORE PHOTOS</button>`;
                container.appendChild(loadMoreDiv);
            }
            
            updateUI();
        }
        
        function loadMore() {
            currentPage++;
            render(false);
        }

        function toggleSel(name) {
            if(selected.has(name)) selected.delete(name);
            else selected.add(name);
            
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.querySelector('.card-info span').innerText;
                if (title === name) {
                    if (selected.has(name)) card.classList.add('selected');
                    else card.classList.remove('selected');
                }
            });
            updateUI();
        }

        function unselectAll() { 
            selected.clear(); 
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            updateUI(); 
        }

        function updateUI() {
            document.getElementById('sel-count').innerText = `${selected.size} ITEMS SELECTED`;
            document.getElementById('dl-btn').disabled = selected.size === 0;
            document.getElementById('unsel-btn').style.display = selected.size > 0 ? 'inline-flex' : 'none';
        }

        function openLightbox(name) {
            viewName = name;
            rotation = 0;
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lb-img');
            const meta = document.getElementById('lb-meta');
            
            img.src = `/full/?folder=${mode}&name=${name}`;
            img.style.transform = `rotate(0deg) scale(1)`;
            meta.innerHTML = `<span class="exif-tag">READING EXIF...</span>`;
            
            parseMetadata(`/full/?folder=${mode}&name=${name}`);
            lb.style.display = 'flex';
        }

        async function parseMetadata(url) {
            try {
                const response = await fetch(url, { headers: { 'Range': 'bytes=0-65536' } });
                const buffer = await response.arrayBuffer();
                const view = new DataView(buffer);
                
                const exif = extractExif(view);
                if (exif) {
                    let focal = exif.focal ? `${Math.round(exif.focal)}mm` : '';
                    let fnum = exif.aperture ? `f/${exif.aperture.toFixed(1)}` : 'f/--';
                    let speed = exif.shutter ? (exif.shutter < 1 ? `1/${Math.round(1/exif.shutter)}s` : `${exif.shutter}s`) : '--s';
                    let iso = exif.iso ? `ISO ${exif.iso}` : 'ISO --';
                    
                    let prefix = mode === 'GRADED' ? `filmOS RECIPE • ${viewName}` : viewName;
                    let details = [prefix, focal, fnum, speed, iso].filter(Boolean).join(' • ');
                    document.getElementById('lb-meta').innerHTML = `<span class="exif-tag" ${mode === 'GRADED' ? 'style="color:cyan; border-color:cyan;"' : ''}>${details}</span>`;
                } else {
                    document.getElementById('lb-meta').innerHTML = `<span class="exif-tag">${viewName} • NO METADATA</span>`;
                }
            } catch (e) { 
                document.getElementById('lb-meta').innerHTML = `<span class="exif-tag">METADATA ERROR</span>`; 
            }
        }

        function extractExif(view) {
            if (view.getUint16(0, false) !== 0xFFD8) return null;
            let offset = 2;
            while (offset < view.byteLength) {
                if (view.getUint8(offset) !== 0xFF) break;
                let marker = view.getUint8(offset + 1);
                if (marker === 0xE1) return parseTags(view, offset + 4);
                offset += 2 + view.getUint16(offset + 2, false);
            }
            return null;
        }

        function parseTags(view, start) {
            if (view.getUint32(start, false) !== 0x45786966) return null; 
            const tiffOffset = start + 6;
            const le = view.getUint16(tiffOffset, false) === 0x4949; 
            const ifd0Offset = view.getUint32(tiffOffset + 4, le);

            let subIfdOffset = 0;
            let entries = view.getUint16(tiffOffset + ifd0Offset, le);
            for (let i = 0; i < entries; i++) {
                let entryOffset = tiffOffset + ifd0Offset + 2 + (i * 12);
                if (view.getUint16(entryOffset, le) === 0x8769) { 
                    subIfdOffset = view.getUint32(entryOffset + 8, le);
                    break;
                }
            }

            if (!subIfdOffset) return null;

            const targetTags = { 0x829A: 'shutter', 0x829D: 'aperture', 0x8827: 'iso', 0x920A: 'focal' };
            let result = {};
            entries = view.getUint16(tiffOffset + subIfdOffset, le);

            for (let i = 0; i < entries; i++) {
                let entryOffset = tiffOffset + subIfdOffset + 2 + (i * 12);
                let tag = view.getUint16(entryOffset, le);

                if (targetTags[tag]) {
                    let type = view.getUint16(entryOffset + 2, le);
                    if (type === 3) {
                        result[targetTags[tag]] = view.getUint16(entryOffset + 8, le);
                    } else if (type === 5) {
                        let valueOffset = view.getUint32(entryOffset + 8, le);
                        let num = view.getUint32(tiffOffset + valueOffset, le);
                        let den = view.getUint32(tiffOffset + valueOffset + 4, le);
                        if (den !== 0) result[targetTags[tag]] = num / den;
                    }
                }
            }
            return result;
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        function rotatePreview() {
            rotation = (rotation + 90) % 360;
            const scale = (rotation === 90 || rotation === 270) ? 0.65 : 1;
            document.getElementById('lb-img').style.transform = `rotate(${rotation}deg) scale(${scale})`;
        }

        function downloadCurrent() { triggerDownload(viewName); }

        async function downloadSelected() {
            const list = Array.from(selected);
            for(let name of list) {
                triggerDownload(name);
                await new Promise(r => setTimeout(r, 800));
            }
        }

        function triggerDownload(name) {
            const link = document.createElement('a');
            link.href = `/full/?folder=${mode}&name=${name}`;
            link.download = name;
            link.click();
        }

        function showLutManager() {
            document.getElementById('lut-modal').style.display = 'flex';
            document.getElementById('lut-upload-status').innerText = '';
        }
        
        function closeLutManager() {
            document.getElementById('lut-modal').style.display = 'none';
        }
        
        // COMPLETELY BYPASSES FORMDATA AND TEMP FILES. SENDS RAW BINARY.
        async function handleLutSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.name.toLowerCase().endsWith('.cube') && !file.name.toLowerCase().endsWith('.cub')) {
                document.getElementById('lut-upload-status').innerText = 'ERROR: ONLY .CUBE FILES ALLOWED';
                document.getElementById('lut-upload-status').style.color = 'red';
                event.target.value = '';
                return;
            }

            document.getElementById('lut-upload-status').innerText = `UPLOADING: ${file.name.toUpperCase()}...`;
            document.getElementById('lut-upload-status').style.color = 'yellow';

            try {
                const res = await fetch('/api/upload_lut', {
                    method: 'POST',
                    headers: {
                        'X-File-Name': file.name
                    },
                    body: file 
                });
                
                if (res.ok) {
                    document.getElementById('lut-upload-status').innerText = `SUCCESS: ${file.name.toUpperCase()} INSTALLED!`;
                    document.getElementById('lut-upload-status').style.color = 'lime';
                } else {
                    document.getElementById('lut-upload-status').innerText = 'ERROR: UPLOAD FAILED';
                    document.getElementById('lut-upload-status').style.color = 'red';
                }
            } catch (e) {
                document.getElementById('lut-upload-status').innerText = 'ERROR: NETWORK CONNECTION';
                document.getElementById('lut-upload-status').style.color = 'red';
            }
            
            event.target.value = ''; 
        }

        init();
    </script>
</body>
</html>
