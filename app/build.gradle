apply plugin: 'com.android.application'

android {
    compileSdkVersion 25
    buildToolsVersion "26.0.2"

    defaultConfig {
        applicationId "com.jpgcookbook.sony"
        minSdkVersion 9
        targetSdkVersion 25
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            // This tells the compiler to look in the 'stubs' folder for the Sony code
            java.srcDirs = ['src/main/java', 'src/main/stubs']
        }
    }
}

// No dependencies needed for the stubs method!
dependencies {}