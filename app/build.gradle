apply plugin: 'com.android.application'

android {
    compileSdkVersion 25
    buildToolsVersion "26.0.2"

    defaultConfig {
        applicationId "com.jpgcookbook.sony"
        minSdkVersion 9
        targetSdkVersion 25
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            // This is the fix: include the local stubs folder
            java.srcDirs = ['src/main/java', 'src/main/stubs']
        }
    }
}

dependencies {
    // No external libraries needed with the stubs method
}