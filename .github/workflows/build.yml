name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install Legacy NDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5

    - name: Download libjpeg-turbo Source
      run: |
        cd app/src/main/cpp
        wget -q https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/2.1.5.1.tar.gz
        tar -xzf 2.1.5.1.tar.gz
        mv libjpeg-turbo-2.1.5.1 libjpeg-turbo

    - name: Create Clean Room SDK & NDK 16.1
      run: |
        mkdir $HOME/clean-sdk
        cp -r $ANDROID_SDK_ROOT/licenses $HOME/clean-sdk/
        
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
        unzip -q commandlinetools-linux-8512546_latest.zip -d $HOME/clean-sdk/cmdline-tools
        
        export JAVA_HOME=$JAVA_HOME_11_X64
        yes | $HOME/clean-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/clean-sdk "platforms;android-10" "build-tools;26.0.2" "ndk;16.1.4479499" "cmake;3.6.4111459" > /dev/null
        
        echo "sdk.dir=$HOME/clean-sdk" > local.properties
        echo "ndk.dir=$HOME/clean-sdk/ndk/16.1.4479499" >> local.properties

    - name: Build with Isolated Legacy Gradle
      run: |
        export JAVA_HOME=$JAVA_HOME_8_X64
        wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
        unzip -q gradle-4.10.3-bin.zip
        
        ./gradle-4.10.3/bin/gradle assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-NDK
        path: app/build/outputs/apk/debug/*.apk