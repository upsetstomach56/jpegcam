name: Build Sony-JPGCookbook

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Setup Gradle 4.10.3
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 4.10.3

    - name: Build APK
      run: |
        # We call 'gradle' directly now because the Action above handles the versioning
        gradle assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-APK
        path: app/build/outputs/apk/debug/*.apk